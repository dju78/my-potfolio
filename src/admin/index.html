<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager | Portfolio Admin</title>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@3.1.2/dist/decap-cms.js"></script>
    <script>
      // Diagnostic script to catch initialization errors
      window.onerror = function(msg, url, line, col, error) {
        var errorBox = document.getElementById('error-reporting');
        if (errorBox) {
          errorBox.style.display = 'block';
          errorBox.innerHTML += '<p style="color: red; margin: 10px 0;">' + msg + ' (Line: ' + line + ')</p>';
        }
        return false;
      };
    </script>
  </head>
  <body>
    <!-- Initial loading state and error reporting -->
    <div id="error-reporting" style="display: none; padding: 20px; background: #fff5f5; border: 1px solid #ffc1c1; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;">
      <h3 style="margin: 0; color: #cc0000;">CMS Error Detected:</h3>
    </div>

    <div id="nc-root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #666;">
        <p>Loading CMS Configuration...</p>
      </div>
    </div>

    <script>
      // EMBEDDED CONFIGURATION
      // This bypasses the need for a separate config.yml file on the server.
      var cmsConfig = {
        backend: {
          name: "git-gateway",
          branch: "main"
        },
        site_url: "https://daramolajo.co.uk",
        display_url: "https://daramolajo.co.uk",
        local_backend: false,
        media_folder: "src/images",
        public_folder: "images",
        collections: [
          {
            name: "books",
            label: "Books & Handbooks",
            folder: "src/content/books",
            create: true,
            slug: "{{title}}",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Subtitle", name: "subtitle", widget: "string", required: false },
              { label: "Publication Year", name: "year", widget: "number" },
              { label: "ISBN", name: "isbn", widget: "string", required: false },
              { label: "ASIN", name: "asin", widget: "string", required: false },
              { label: "Cover Image", name: "image", widget: "image" },
              { label: "Description", name: "body", widget: "markdown" },
              { label: "Amazon Link", name: "link", widget: "string" }
            ]
          },
          {
            name: "journal_articles",
            label: "Journal Articles",
            folder: "src/content/journal-articles",
            create: true,
            slug: "{{year}}-{{title}}",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Journal Name", name: "journal", widget: "string" },
              { label: "Year", name: "year", widget: "number" },
              { label: "DOI/Link", name: "doi", widget: "string", required: false },
              { label: "Description", name: "body", widget: "markdown" },
              { label: "Contributors", name: "contributors", widget: "string", required: false }
            ]
          },
          {
            name: "awards",
            label: "Awards & Honours",
            folder: "src/content/awards",
            create: true,
            slug: "{{title}}",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Issuer", name: "issuer", widget: "string" },
              { label: "Date", name: "date_issued", widget: "string" },
              { label: "Image", name: "image", widget: "image" },
              { label: "Description", name: "body", widget: "markdown" },
              {
                label: "Media Coverage Links",
                name: "coverage",
                widget: "list",
                fields: [
                  { label: "URI", name: "url", widget: "string" }
                ]
              }
            ]
          },
          {
            name: "projects",
            label: "Projects",
            folder: "src/content/projects",
            create: true,
            slug: "{{title}}",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Client/Category", name: "client", widget: "string" },
              { label: "Badge", name: "badge", widget: "string" },
              { label: "Description", name: "description", widget: "text" },
              { label: "Live Demo Link", name: "link", widget: "string" },
              {
                label: "Highlights",
                name: "highlights",
                widget: "list",
                fields: [
                  { label: "Text", name: "text", widget: "string" }
                ]
              },
              {
                label: "Tech Stack",
                name: "tags",
                widget: "list",
                fields: [
                  { label: "Tool", name: "tag", widget: "string" }
                ]
              }
            ]
          },
          {
            name: "working_papers",
            label: "Working Papers & Preprints",
            folder: "src/content/working-papers",
            create: true,
            slug: "{{year}}-{{title}}",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Source/Journal", name: "journal", widget: "string" },
              { label: "Year", name: "year", widget: "number" },
              { label: "DOI/Link", name: "doi", widget: "string", required: false },
              { label: "Description", name: "body", widget: "markdown" },
              { label: "Contributors", name: "contributors", widget: "string", required: false }
            ]
          },
          {
            name: "media",
            label: "Media & Policy Commentary",
            folder: "src/content/media",
            create: true,
            slug: "{{title}}",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Description", name: "description", widget: "text" },
              { label: "Publication Date", name: "date_issued", widget: "string" },
              {
                label: "Coverage",
                name: "coverage",
                widget: "list",
                fields: [
                  { label: "Source Name", name: "source", widget: "string" },
                  { label: "Link", name: "url", widget: "string" }
                ]
              },
              { label: "Other Platforms", name: "other_platforms", widget: "string", required: false }
            ]
          },
          {
            name: "research",
            label: "Research & Dissertations",
            folder: "src/content/research",
            create: true,
            slug: "{{title}}",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Institution", name: "institution", widget: "string" },
              { label: "Badge", name: "badge", widget: "string" },
              {
                label: "Methodology/Focus Items",
                name: "items",
                widget: "list",
                fields: [
                  { label: "Point", name: "text", widget: "string" }
                ]
              },
              { label: "Outcome", name: "outcome", widget: "string", required: false }
            ]
          }
        ]
      };

      // Initialize CMS with the embedded object
      CMS.init({ config: cmsConfig });
    </script>
  </body>
</html>
